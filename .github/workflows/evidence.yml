name: Deploy Evidence Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'esg-evidence/esg-evidence-new/**'
      - 'esg-pipelines/init_sample_warehouse.py'
      - '.github/workflows/evidence.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.24.2
          cache: true

      - name: Generate sample data
        run: pixi run generate

      - name: Install Evidence
        run: pixi run install

      - name: Set base path for GitHub Pages
        working-directory: esg-evidence/esg-evidence-new
        run: |
          printf '\ndeployment:\n  basePath: /%s\n' \
            "${{ github.event.repository.name }}" >> evidence.config.yaml

      - name: Extract data sources
        working-directory: esg-evidence/esg-evidence-new
        run: npm run sources

      - name: Build Evidence Dashboard
        working-directory: esg-evidence/esg-evidence-new
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: esg-evidence/esg-evidence-new/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
