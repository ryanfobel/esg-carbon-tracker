name: Deploy Evidence Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'esg-evidence/esg-evidence-new/**'
      - 'esg-pipelines/init_sample_warehouse.py'
      - '.github/workflows/evidence.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: esg-evidence/esg-evidence-new/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate sample warehouse
        run: |
          pip install duckdb
          python esg-pipelines/init_evidence_warehouse.py

      - name: Install Evidence
        working-directory: esg-evidence/esg-evidence-new
        run: npm ci

      - name: Build Evidence Dashboard
        working-directory: esg-evidence/esg-evidence-new
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: esg-evidence/esg-evidence-new/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
