# GCP Carbon Footprint Pipeline Configuration

source: gcp_carbon_footprint
description: "Google Cloud Platform carbon emissions data via BigQuery"

# Schedule
schedule:
  frequency: monthly  # Run monthly after GCP updates (15th of following month)
  day_of_month: 16    # Run on 16th to ensure data is available
  time: "02:00"       # 2 AM local time

# BigQuery settings
bigquery:
  dataset_id: carbon_footprint_dataset  # Default dataset name
  table_id: carbon_footprint            # Default table name

# Incremental loading
incremental:
  enabled: true
  lookback_months: 3  # Initial load: fetch last 3 months
  # After first run, only fetch new months since last_usage_month

# Destination
destination:
  type: duckdb
  warehouse_path: ~/.paimon/esg_data/warehouse.duckdb
  schema: raw
  table: gcp_carbon_footprint

# Data quality
validation:
  # Ensure scope totals are reasonable
  max_scope1_kgco2e: 1000000  # 1,000 metric tons
  max_scope2_kgco2e: 10000000  # 10,000 metric tons
  max_scope3_kgco2e: 50000000  # 50,000 metric tons

  # Ensure recent data exists
  max_age_days: 90  # Alert if no data younger than 90 days

# Alerts (future)
alerts:
  email: []  # Email addresses for pipeline failures
  slack: null  # Slack webhook for notifications

# Metadata
version: 1.0
created: 2026-06-29
updated: 2026-06-29
